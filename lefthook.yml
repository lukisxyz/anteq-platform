pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm oxlint {staged_files}
      exclude:
        - "src/app/router.gen.ts"
      stage_fixed: true
    format:
      glob: "*.{js,ts,json,md}"
      run: pnpm oxfmt {staged_files}
      exclude:
        - "src/app/router.gen.ts"
      stage_fixed: true
